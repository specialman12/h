<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR MEMBER</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:#39ff14;
font-family:monospace;
text-align:center;
overflow-x:hidden;
}

/* MATRIX */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
max-width:850px;
margin:auto;
padding:100px 20px;
}

h1{
font-size:clamp(28px,5vw,42px);
margin-bottom:40px;
text-shadow:0 0 15px #39ff14;
}

/* MESSAGE BOX */

.message{
border:2px solid #39ff14;
padding:40px;
box-shadow:0 0 20px #39ff14;
margin-top:30px;
display:none;
}

#text{
font-size:20px;
line-height:1.6;
margin-top:20px;
}

.code{
font-size:26px;
margin-top:25px;
display:none;
text-shadow:0 0 10px #39ff14;
}

/* BUTTON */

.btn{
background:transparent;
border:2px solid #39ff14;
color:#39ff14;
padding:14px 40px;
font-size:18px;
cursor:pointer;
margin-top:25px;
transition:.3s;
box-shadow:0 0 10px #39ff14;
}

.btn:hover{
background:#39ff14;
color:black;
}

#storeBtn,
#instaBtn{
display:none;
}
.dev{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
opacity:0.7;
}

.dev img{
width:35px;
height:auto;
filter:brightness(0) invert(1); /* يخلي اللوجو أبيض */
} 
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>YOU FOUND A QR MEMBER</h1>

<button class="btn" id="enterBtn">
ENTER THE SYSTEM
</button>

<div class="message" id="messageBox">

<h2>CONGRATULATIONS</h2>

<p id="text"></p>

<p class="code" id="discount"></p>

<a href="https://yourstore.com" target="_blank">
<button class="btn" id="storeBtn">
Get the gift 
</button>
</a>

<a href="https://instagram.com" target="_blank">
<button class="btn" id="instaBtn">
FOLLOW INSTAGRAM
</button>
</a>

</div>

</div>

<footer class="dev">
<img src="logo.png" alt="Developer Logo">
</footer>
<script>

/* MATRIX BACKGROUND */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01QRSCANSYSTEM";
const fontSize=16;
const columns=canvas.width/fontSize;
const drops=[];

for(let x=0;x<columns;x++)drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#39ff14";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);


/* TYPEWRITER */

const messageText =
"IF YOU'RE WATCHING THIS,\nYOU JUST FOUND A QR MEMBER.";

let i=0;

function typeMessage(){

if(i<messageText.length){

if(messageText.charAt(i)=="\n"){
document.getElementById("text").innerHTML+="<br>";
}else{
document.getElementById("text").innerHTML+=messageText.charAt(i);
}

i++;

setTimeout(typeMessage,40);

}else{

/* SHOW DISCOUNT */

setTimeout(()=>{

document.getElementById("discount").style.display="block";

document.getElementById("discount").innerHTML=
"USE CODE: QR10<br>TO GET 10% OFF";

},400);

/* SHOW STORE BUTTON */

setTimeout(()=>{

document.getElementById("storeBtn").style.display="inline-block";

},1200);

/* SHOW INSTAGRAM */

setTimeout(()=>{

document.getElementById("instaBtn").style.display="inline-block";

},2000);

}

}

/* ENTER SYSTEM */

document.getElementById("enterBtn").onclick=function(){

document.getElementById("messageBox").style.display="block";

setTimeout(()=>{

typeMessage();

},500);

}

</script>

</body>
</html>
